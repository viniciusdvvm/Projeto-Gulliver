<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <form action="" method="post" id="login" class="form__dados">
        <h2>Cadastre aqui uma nova atração turística!</h2>
        <p>
            <label for="type">Nome da Atração:</label>
            <input type="text" id="Atração"  class="componente" placeholder="Ex: Avenida Paulista"
            required>
        </p>
        <p>

            <label for="type">Descrição da atração:</label>
            <input type="text" id="text" class="componente" 
            placeholder="Ex: Avenida situada na cidade de São Paulo..." required>
        </p>
        <p>
            <label for="type">Anexar fotos da atração:</label>
            <input type="file" id="image" 
            class="componente" placeholder="Ex: Avenida situada na cidade de São Paulo..." re>
        </p>
        <p>
            <button type="submit" class="botao__enviar">Enviar</button>
        </p>
</body>

</html>
